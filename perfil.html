<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IIT — Mi Perfil</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#080b10;--surface:#0d1117;--surface2:#131820;--border:#1e2a38;--accent:#00d4ff;--accent2:#0077ff;--text:#e8f0f8;--muted:#4a6070;--success:#00e5a0;--error:#ff4560;--warn:#ffb700;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"DM Mono",monospace;background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.topbar{background:rgba(8,11,16,0.97);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);}
.logo-img{width:32px;height:32px;object-fit:contain;}
.logo-name{font-family:"Syne",sans-serif;font-size:13px;font-weight:700;color:var(--text);}
.topbar-sep{flex:1;}
.btn-o{background:none;border:1px solid var(--border);border-radius:7px;padding:8px 14px;font-family:"Syne",sans-serif;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all 0.2s;text-decoration:none;display:inline-block;}
.btn-o:hover{border-color:var(--accent2);color:var(--accent);}
.wrapper{max-width:600px;margin:0 auto;padding:32px 16px;position:relative;z-index:1;}

/* AVATAR CARD */
.avatar-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;margin-bottom:20px;display:flex;align-items:center;gap:20px;}
.avatar-circle{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));display:flex;align-items:center;justify-content:center;font-family:"Syne",sans-serif;font-size:28px;font-weight:800;color:#080b10;flex-shrink:0;}
.avatar-info{}
.avatar-nombre{font-family:"Syne",sans-serif;font-size:18px;font-weight:700;color:var(--text);}
.avatar-email{font-size:12px;color:var(--muted);margin-top:3px;}
.rol-badge{display:inline-block;margin-top:8px;padding:3px 10px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:1.5px;}
.rol-admin{background:rgba(0,212,255,0.1);color:var(--accent);border:1px solid rgba(0,212,255,0.3);}
.rol-tecnico{background:rgba(0,119,255,0.1);color:var(--accent2);border:1px solid rgba(0,119,255,0.3);}
.rol-cliente{background:rgba(0,229,160,0.1);color:var(--success);border:1px solid rgba(0,229,160,0.3);}

/* SECCIONES */
.sec{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:16px;overflow:hidden;}
.sec-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:rgba(0,0,0,0.2);}
.sec-icon{font-size:16px;}
.sec-title{font-family:"Syne",sans-serif;font-size:13px;font-weight:700;color:var(--text);}
.sec-body{padding:20px;}
.field{margin-bottom:16px;}
.field:last-child{margin-bottom:0;}
label{display:block;font-size:10px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:7px;}
input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-family:"DM Mono",monospace;font-size:13px;color:var(--text);outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
input:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(0,119,255,0.1);}
input::placeholder{color:var(--muted);opacity:0.5;}
input:disabled{opacity:0.5;cursor:not-allowed;}

/* PASSWORD STRENGTH */
.pass-strength{margin-top:8px;}
.pass-bar{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-bottom:4px;}
.pass-fill{height:100%;border-radius:2px;transition:all 0.3s;width:0%;}
.pass-label{font-size:10px;color:var(--muted);letter-spacing:0.5px;}

/* BTN */
.btn{padding:12px 24px;border-radius:8px;font-family:"Syne",sans-serif;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:0.5px;transition:all 0.2s;border:none;display:inline-flex;align-items:center;gap:6px;}
.btn-p{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#080b10;}
.btn-p:hover:not(:disabled){opacity:0.9;}
.btn-p:disabled{opacity:0.4;cursor:not-allowed;}
.btn-danger{background:none;border:1px solid rgba(255,69,96,0.3);color:var(--error);}
.btn-danger:hover{background:rgba(255,69,96,0.1);}
.btn .spin{display:none;width:14px;height:14px;border:2px solid rgba(0,0,0,0.3);border-top-color:#080b10;border-radius:50%;animation:spin 0.6s linear infinite;}
.btn.loading .btn-text{display:none;}
.btn.loading .spin{display:block;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ALERT */
.alert{padding:12px 16px;border-radius:8px;font-size:12px;margin-top:14px;display:none;letter-spacing:0.5px;}
.alert-success{background:rgba(0,229,160,0.1);border:1px solid rgba(0,229,160,0.3);color:var(--success);}
.alert-error{background:rgba(255,69,96,0.1);border:1px solid rgba(255,69,96,0.3);color:var(--error);}

/* INFO ROWS */
.info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:12px;}
.info-row:last-child{border-bottom:none;}
.info-label{color:var(--muted);letter-spacing:0.5px;}
.info-val{color:var(--text);}
</style>
</head>

<script>
let _user = null;

(async () => {
  _user = await initAuth();
  if (!_user) return;
  cargarPerfil();
  setupEvents();
})();

async function cargarPerfil() {
  const u = _user;
  const rolLabel = { admin:'ADMINISTRADOR', tecnico:'TECNICO', cliente:'CLIENTE' }[u.rol] || u.rol;
  const rolColor = { admin:'rol-admin', tecnico:'rol-tecnico', cliente:'rol-cliente' }[u.rol] || '';

  // Avatar
  document.getElementById('avatarCircle').textContent = u.nombre?.charAt(0).toUpperCase() || '?';
  document.getElementById('avatarNombre').textContent = u.nombre || '—';
  document.getElementById('avatarEmail').textContent  = u.email || '—';
  const badge = document.getElementById('rolBadge');
  badge.textContent = rolLabel;
  badge.className = 'rol-badge ' + rolColor;

  // Info
  document.getElementById('infoNombre').textContent = u.nombre || '—';
  document.getElementById('infoEmail').textContent  = u.email  || '—';
  document.getElementById('infoRol').textContent    = rolLabel;
  document.getElementById('infoEstado').innerHTML   = u.activo
    ? '<span style="color:var(--success);">&#9679; ACTIVO</span>'
    : '<span style="color:var(--error);">&#9679; INACTIVO</span>';
  document.getElementById('infoFecha').textContent  = u.created_at
    ? new Date(u.created_at).toLocaleDateString('es-CO',{day:'2-digit',month:'long',year:'numeric'})
    : '—';

  // Datos por rol
  if (u.rol === 'tecnico' && u.tecnicos) {
    document.getElementById('infoEspRow').style.display = 'flex';
    document.getElementById('infoEsp').textContent = (u.tecnicos.especialidades||[]).join(', ') || 'Sin especialidades';
  }
  if (u.rol === 'cliente' && u.clientes) {
    document.getElementById('infoEmpRow').style.display = 'flex';
    document.getElementById('infoEmp').textContent = u.clientes.empresa || '—';
    document.getElementById('infoCodigoRow').style.display = 'flex';
    document.getElementById('infoCodigo').textContent = u.clientes.codigo_acceso || '—';
  }

  // Botón volver según rol
  const rutas = { admin:'admin/dashboard.html', tecnico:'tecnico/dashboard.html', cliente:'cliente/dashboard.html' };
  document.getElementById('btnVolver').href = rutas[u.rol] || 'login.html';
}

// ── FORTALEZA DE CONTRASENA ───────────────────────────────────
document.getElementById('newPass').addEventListener('input', () => {
  const val = document.getElementById('newPass').value;
  let score = 0;
  if (val.length >= 8)  score++;
  if (val.length >= 12) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;

  const pct   = (score / 5) * 100;
  const color = score <= 1 ? 'var(--error)' : score <= 3 ? 'var(--warn)' : 'var(--success)';
  const label = score <= 1 ? 'Muy debil' : score <= 2 ? 'Debil' : score <= 3 ? 'Moderada' : score <= 4 ? 'Fuerte' : 'Muy fuerte';

  document.getElementById('passFill').style.width      = pct + '%';
  document.getElementById('passFill').style.background = color;
  document.getElementById('passLabel').textContent     = label;
  document.getElementById('passLabel').style.color     = color;
});

// ── CAMBIAR CONTRASENA ────────────────────────────────────────
function setupEvents() {
  document.getElementById('btnCambiarPass').addEventListener('click', async () => {
    const newPass     = document.getElementById('newPass').value;
    const confirmPass = document.getElementById('confirmPass').value;
    const btn         = document.getElementById('btnCambiarPass');
    const alertOk     = document.getElementById('alertSuccess');
    const alertErr    = document.getElementById('alertError');

    alertOk.style.display  = 'none';
    alertErr.style.display = 'none';

    if (newPass.length < 8) {
      alertErr.textContent   = 'La contrasena debe tener al menos 8 caracteres';
      alertErr.style.display = 'block'; return;
    }
    if (newPass !== confirmPass) {
      alertErr.textContent   = 'Las contrasenas no coinciden';
      alertErr.style.display = 'block'; return;
    }

    btn.classList.add('loading'); btn.disabled = true;

    try {
      const { error } = await db.auth.updateUser({ password: newPass });
      if (error) throw error;
      alertOk.style.display = 'block';
      document.getElementById('newPass').value     = '';
      document.getElementById('confirmPass').value = '';
      document.getElementById('passFill').style.width = '0%';
      document.getElementById('passLabel').textContent = 'Ingresa una contrasena';
      document.getElementById('passLabel').style.color = 'var(--muted)';
    } catch(e) {
      alertErr.textContent   = 'Error: ' + e.message;
      alertErr.style.display = 'block';
    }

    btn.classList.remove('loading'); btn.disabled = false;
  });

  document.getElementById('btnLogout').addEventListener('click', async () => {
    await Auth.logout();
  });
}
</script>
