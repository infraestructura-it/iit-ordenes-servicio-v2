<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IIT — Mis Ordenes</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#080b10;--surface:#0d1117;--surface2:#131820;--border:#1e2a38;--accent:#00d4ff;--accent2:#0077ff;--text:#e8f0f8;--muted:#4a6070;--success:#00e5a0;--error:#ff4560;--warn:#ffb700;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"DM Mono",monospace;background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}

/* TOPBAR */
.topbar{background:rgba(8,11,16,0.97);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);}
.logo-img{width:32px;height:32px;object-fit:contain;}
.logo-name{font-family:"Syne",sans-serif;font-size:13px;font-weight:700;color:var(--text);}
.topbar-sep{flex:1;}

/* MAIN */
.main{max-width:900px;margin:0 auto;padding:28px 20px 60px;position:relative;z-index:1;}

/* BIENVENIDA */
.welcome-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;position:relative;overflow:hidden;}
.welcome-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent2),var(--accent));}
.welcome-name{font-family:"Syne",sans-serif;font-size:20px;font-weight:800;color:var(--text);}
.welcome-empresa{font-size:12px;color:var(--muted);margin-top:4px;letter-spacing:0.5px;}
.btn-nueva{padding:10px 20px;background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;border-radius:8px;font-family:"Syne",sans-serif;font-size:12px;font-weight:700;color:#080b10;cursor:pointer;letter-spacing:0.5px;text-decoration:none;display:inline-block;}
.btn-nueva:hover{opacity:0.85;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
@media(max-width:600px){.stats-row{grid-template-columns:1fr;}}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative;overflow:hidden;}
.stat-card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;}
.s-activas::before{background:var(--accent2);}
.s-proceso::before{background:var(--accent);}
.s-cerradas::before{background:var(--success);}
.stat-label{font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:6px;}
.stat-val{font-family:"Syne",sans-serif;font-size:32px;font-weight:800;line-height:1;}
.s-activas .stat-val{color:var(--accent2);}
.s-proceso .stat-val{color:var(--accent);}
.s-cerradas .stat-val{color:var(--success);}
.stat-sub{font-size:10px;color:var(--muted);margin-top:3px;}

/* FILTROS */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.sec-title{font-family:"Syne",sans-serif;font-size:13px;font-weight:700;color:var(--text);}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.fbtn{padding:7px 14px;background:var(--surface);border:1px solid var(--border);border-radius:6px;font-family:"DM Mono",monospace;font-size:11px;color:var(--muted);cursor:pointer;transition:all 0.2s;letter-spacing:0.5px;}
.fbtn:hover{border-color:var(--accent2);color:var(--text);}
.fbtn.active{background:rgba(0,119,255,0.1);border-color:var(--accent2);color:var(--accent);}
.btn-o{background:none;border:1px solid var(--border);border-radius:7px;padding:7px 14px;font-family:"Syne",sans-serif;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all 0.2s;letter-spacing:0.5px;}
.btn-o:hover{border-color:var(--accent2);color:var(--accent);}

/* ORDEN CARDS */
.ordenes-list{display:flex;flex-direction:column;gap:12px;}
.orden-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.orden-card:hover{border-color:var(--accent2);transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,0.3);}
.orden-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;}
.oc-borrador::before,.oc-pendiente::before{background:var(--warn);}
.oc-asignada::before{background:var(--accent2);}
.oc-en_proceso::before{background:var(--accent);}
.oc-en_pausa::before{background:#ff8c00;}
.oc-cerrada::before{background:var(--success);}
.oc-cancelada::before{background:var(--error);}

.oc-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:12px;}
.oc-id{font-family:"Syne",sans-serif;font-weight:800;color:var(--accent);font-size:14px;letter-spacing:1px;}
.oc-fecha{font-size:10px;color:var(--muted);margin-top:3px;}

.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:5px;font-size:9px;letter-spacing:1px;font-weight:700;border:1px solid;white-space:nowrap;}
.b-borrador,.b-pendiente{background:rgba(255,183,0,0.1);border-color:rgba(255,183,0,0.3);color:var(--warn);}
.b-asignada{background:rgba(0,119,255,0.1);border-color:rgba(0,119,255,0.3);color:var(--accent2);}
.b-en_proceso{background:rgba(0,212,255,0.1);border-color:rgba(0,212,255,0.3);color:var(--accent);}
.b-en_pausa{background:rgba(255,140,0,0.1);border-color:rgba(255,140,0,0.3);color:#ff8c00;}
.b-cerrada{background:rgba(0,229,160,0.1);border-color:rgba(0,229,160,0.3);color:var(--success);}
.b-cancelada{background:rgba(255,69,96,0.1);border-color:rgba(255,69,96,0.3);color:var(--error);}

.oc-desc{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.oc-meta{display:flex;gap:16px;flex-wrap:wrap;}
.oc-meta-item{display:flex;flex-direction:column;gap:2px;}
.oml{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;}
.omv{font-size:12px;color:var(--text);}

/* TIMELINE STATUS */
.status-timeline{display:flex;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.st-step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative;}
.st-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--border);background:var(--surface2);transition:all 0.3s;z-index:1;}
.st-dot.done{border-color:var(--success);background:var(--success);}
.st-dot.active{border-color:var(--accent2);background:var(--accent2);box-shadow:0 0 8px var(--accent2);}
.st-label{font-size:8px;color:var(--muted);margin-top:4px;letter-spacing:0.5px;text-align:center;}
.st-label.active{color:var(--accent2);}
.st-label.done{color:var(--success);}
.st-line{position:absolute;top:5px;left:50%;width:100%;height:2px;background:var(--border);z-index:0;}
.st-line.done{background:var(--success);}

/* EMPTY */
.empty{text-align:center;padding:80px 20px;color:var(--muted);}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:0.3;}
.empty p{margin-bottom:20px;font-size:13px;}

/* NOTIF */
.notif-btn{position:relative;background:none;border:1px solid var(--border);border-radius:8px;padding:8px;cursor:pointer;color:var(--muted);transition:all 0.2s;font-size:16px;}
.notif-btn:hover{border-color:var(--accent2);color:var(--accent);}
.notif-badge{position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:var(--error);border-radius:50%;font-size:9px;display:none;align-items:center;justify-content:center;color:white;font-weight:700;}
</style>
</head>

      <div class="welcome-empresa" id="welcomeEmpresa">Cargando...</div>
    </div>
    <a href="../index.html" class="btn-nueva">+ Solicitar Servicio</a>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card s-activas">
      <div class="stat-label">MIS ORDENES</div>
      <div class="stat-val" id="stTotal">—</div>
      <div class="stat-sub">total historial</div>
    </div>
    <div class="stat-card s-proceso">
      <div class="stat-label">EN PROCESO</div>
      <div class="stat-val" id="stActivas">—</div>
      <div class="stat-sub">activas ahora</div>
    </div>
    <div class="stat-card s-cerradas">
      <div class="stat-label">COMPLETADAS</div>
      <div class="stat-val" id="stCerradas">—</div>
      <div class="stat-sub">resueltas</div>
    </div>
  </div>

  <!-- ORDENES -->
  <div class="sec-head">
    <span class="sec-title">MIS ORDENES DE SERVICIO</span>
    <button class="btn-o" id="btnRefresh">&#8635; Actualizar</button>
    <button class="btn-o" id="btnExcel" style="border-color:rgba(0,229,160,0.3);color:var(--success);">&#128217; Excel</button>
    <button class="btn-o" id="btnPdf" style="border-color:rgba(0,119,255,0.3);color:var(--accent2);">&#128196; PDF</button>
  </div>

  <div class="filters">
    <button class="fbtn active" data-f="all">TODAS</button>
    <button class="fbtn" data-f="pendiente">PENDIENTES</button>
    <button class="fbtn" data-f="en_proceso">EN PROCESO</button>
    <button class="fbtn" data-f="cerrada">CERRADAS</button>
  </div>

  <div class="ordenes-list" id="ordenesList">
    <div class="empty"><p>Cargando tus ordenes...</p></div>
  </div>
</div>

<script src="../assets/supabase.js"></script>
<script src="../assets/auth.js"></script>
<script src="../assets/excel.js"></script>
<script src="../assets/pdf.js"></script>
<script>
let _user = null, _cliente = null, _ordenes = [], _filtro = 'all';

const STATUS_STEPS = ['pendiente','asignada','en_proceso','cerrada'];
const STATUS_LABEL = {
  borrador:'Borrador', pendiente:'Pendiente', asignada:'Asignada',
  en_proceso:'En Proceso', en_pausa:'En Pausa', cerrada:'Cerrada', cancelada:'Cancelada'
};

(async () => {
  _user = await initAuth('cliente');
  if (!_user) return;

  // Cargar datos del cliente
  const { data: cl } = await db.from('clientes').select('*').eq('usuario_id', _user.id).single();
  _cliente = cl;

  document.getElementById('welcomeName').textContent = 'Hola, ' + _user.nombre.split(' ')[0];
  document.getElementById('welcomeEmpresa').textContent = (cl?.empresa || '') + ' · ' + (cl?.ciudad || '');

  await loadOrdenes();
  setupEvents();
  loadNotifs();
})();

async function loadOrdenes() {
  if (!_cliente) return;
  try {
    const { data, error } = await db.from('ordenes')
      .select('*')
      .eq('cliente_id', _cliente.id)
      .order('created_at', { ascending: false });
    if (error) throw error;
    _ordenes = data || [];
    updateStats();
    renderOrdenes();
  } catch(e) { console.error(e); }
}

function updateStats() {
  const activas = _ordenes.filter(o => ['pendiente','asignada','en_proceso','en_pausa'].includes(o.status));
  document.getElementById('stTotal').textContent   = _ordenes.length;
  document.getElementById('stActivas').textContent = activas.length;
  document.getElementById('stCerradas').textContent= _ordenes.filter(o => o.status === 'cerrada').length;
}

function renderOrdenes() {
  const filtered = _filtro === 'all' ? _ordenes : _ordenes.filter(o => o.status === _filtro);
  if (!filtered.length) {
    document.getElementById('ordenesList').innerHTML =
      '<div class="empty"><div class="empty-icon">&#128203;</div><p>' +
      (_ordenes.length === 0 ? 'No tienes ordenes de servicio aun.' : 'No hay ordenes en esta categoria.') +
      '</p><a href="../index.html" class="btn-nueva">+ Solicitar primer servicio</a></div>';
    return;
  }

  document.getElementById('ordenesList').innerHTML = filtered.map(o => {
    const fecha = o.created_at ? new Date(o.created_at).toLocaleDateString('es-CO',{day:'2-digit',month:'short',year:'numeric'}) : '—';
    const fechaReq = o.fecha_requerida ? new Date(o.fecha_requerida).toLocaleDateString('es-CO',{day:'2-digit',month:'short'}) : '—';

    // Timeline de estado
    const steps = STATUS_STEPS;
    const curIdx = steps.indexOf(o.status);
    const timelineHtml = '<div class="status-timeline">' +
      steps.map((s, i) => {
        const isDone   = curIdx > i;
        const isActive = curIdx === i;
        const isLast   = i === steps.length - 1;
        return '<div class="st-step">' +
          (!isLast ? '<div class="st-line' + (isDone ? ' done' : '') + '"></div>' : '') +
          '<div class="st-dot' + (isDone ? ' done' : isActive ? ' active' : '') + '"></div>' +
          '<div class="st-label' + (isDone ? ' done' : isActive ? ' active' : '') + '">' + STATUS_LABEL[s] + '</div>' +
          '</div>';
      }).join('') +
    '</div>';

    return '<div class="orden-card oc-' + (o.status||'pendiente') + '" data-id="' + o.id + '">' +
      '<div class="oc-head">' +
        '<div>' +
          '<div class="oc-id">' + (o.orden_id||'—') + '</div>' +
          '<div class="oc-fecha">Creada: ' + fecha + '</div>' +
        '</div>' +
        '<span class="badge b-' + (o.status||'pendiente') + '">' + (STATUS_LABEL[o.status]||'—').toUpperCase() + '</span>' +
      '</div>' +
      '<div class="oc-desc">' + (o.sintoma || o.tipo_servicio || 'Sin descripcion') + '</div>' +
      '<div class="oc-meta">' +
        '<div class="oc-meta-item"><div class="oml">SERVICIO</div><div class="omv">' + (o.tipo_servicio||'—') + '</div></div>' +
        '<div class="oc-meta-item"><div class="oml">AREA</div><div class="omv">' + (o.area||'—') + '</div></div>' +
        '<div class="oc-meta-item"><div class="oml">FECHA REQ.</div><div class="omv">' + fechaReq + '</div></div>' +
      '</div>' +
      timelineHtml +
    '</div>';
  }).join('');

  document.querySelectorAll('.orden-card').forEach(card => {
    card.addEventListener('click', () => {
      window.location.href = 'orden.html?id=' + card.dataset.id;
    });
  });
}

function setupEvents() {
  document.getElementById('btnRefresh').addEventListener('click', loadOrdenes);
  document.getElementById('btnExcel').addEventListener('click', async () => {
    if (!_ordenes.length) { toast('No hay ordenes para exportar','error'); return; }
    toast('Generando Excel...','info');
    await exportarExcelOrdenes(_ordenes, 'cliente');
  });
  document.getElementById('btnPdf').addEventListener('click', async () => {
    if (!_ordenes.length) { toast('No hay ordenes para exportar','error'); return; }
    toast('Generando PDF...','info');
    await exportarPDFListado(_ordenes, 'Mis Ordenes de Servicio — ' + (_user?.nombre||'Cliente'));
  });
  document.querySelectorAll('.fbtn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      _filtro = btn.dataset.f;
      renderOrdenes();
    });
  });
  document.getElementById('notifBtn').addEventListener('click', toggleNotifPanel);
}

async function loadNotifs() {
  try {
    const ns = await Notificaciones.getByUsuario(_user.id);
    const nl = ns.filter(n => !n.leida).length;
    const badge = document.getElementById('notifBadge');
    badge.textContent = nl;
    badge.style.display = nl > 0 ? 'flex' : 'none';
  } catch(e) {}
}

function toggleNotifPanel() {
  toast('Notificaciones — proximamente', 'info');
}

function toast(msg, tipo='success') {
  const c={success:'var(--success)',error:'var(--error)',info:'var(--accent2)'};
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;background:var(--surface);border:1px solid '+c[tipo]+';border-radius:10px;padding:12px 18px;box-shadow:0 8px 32px rgba(0,0,0,0.4);font-family:"DM Mono",monospace;font-size:12px;color:'+c[tipo]+';letter-spacing:0.5px;';
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3500);
}
</script>
</body>
</html>
