<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IIT — Ejecutar Protocolo</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#080b10;--surface:#0d1117;--surface2:#131820;--border:#1e2a38;--accent:#00d4ff;--accent2:#0077ff;--text:#e8f0f8;--muted:#4a6070;--success:#00e5a0;--error:#ff4560;--warn:#ffb700;}

/* ══════════════════════════════════════════
   TEMA CLARO — BLANCO PROFESIONAL
   ══════════════════════════════════════════ */
[data-theme="light"] {
  --bg:      #ffffff;
  --surface: #f5f7fa;
  --surface2:#eef1f6;
  --border:  #dde2ed;
  --accent:  #0077ff;
  --accent2: #0055cc;
  --text:    #111827;
  --muted:   #6b7280;
  --success: #059669;
  --error:   #dc2626;
  --warn:    #d97706;
  --purple:  #7c3aed;
}
[data-theme="light"] body::before {
  background-image:
    linear-gradient(rgba(0,85,204,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,85,204,0.04) 1px, transparent 1px);
}
[data-theme="light"] .topbar {
  background: rgba(255,255,255,0.97);
  box-shadow: 0 1px 12px rgba(0,0,0,0.08);
}
[data-theme="light"] .sidebar {
  background: #f5f7fa;
  box-shadow: 1px 0 12px rgba(0,0,0,0.05);
}
[data-theme="light"] input,
[data-theme="light"] select,
[data-theme="light"] textarea {
  background: #ffffff;
  color: var(--text);
}
[data-theme="light"] input::placeholder,
[data-theme="light"] textarea::placeholder { color: #9ca3af; }
[data-theme="light"] select option { background: #ffffff; color: #111827; }
[data-theme="light"] .modal,
[data-theme="light"] .modal-overlay > .modal { background: #ffffff; }
[data-theme="light"] .tw,
[data-theme="light"] .stat-card,
[data-theme="light"] .cot-card,
[data-theme="light"] .proto-preview,
[data-theme="light"] .res-card,
[data-theme="light"] .card { background: #ffffff; }
[data-theme="light"] tbody tr:hover { background: #f0f4ff; }
[data-theme="light"] .nav-item.active { background: rgba(0,85,204,0.08); }
[data-theme="light"] .nav-item:hover  { background: rgba(0,0,0,0.04); }
[data-theme="light"] .badge.b-borrador { background: rgba(107,114,128,0.1); }
[data-theme="light"] #themeToggle {
  background: rgba(0,85,204,0.08);
  border-color: rgba(0,85,204,0.2);
}

/* TOGGLE BUTTON BASE */
#themeToggle {
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 16px;
  cursor: pointer;
  transition: all 0.2s;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
#themeToggle:hover { opacity: 0.8; transform: scale(1.05); }

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"DM Mono",monospace;background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.topbar{background:rgba(8,11,16,0.97);border-bottom:1px solid var(--border);padding:0 20px;height:60px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);}
.logo-img{width:30px;height:30px;object-fit:contain;}
.logo-name{font-family:"Syne",sans-serif;font-size:13px;font-weight:700;color:var(--text);}
.topbar-sep{flex:1;}
.wrapper{max-width:700px;margin:0 auto;padding:24px 16px 120px;}

/* HEADER */
.proto-header{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:18px;}
.ph-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:10px;}
.ph-name{font-family:"Syne",sans-serif;font-size:18px;font-weight:800;color:var(--text);}
.ph-equipo{font-size:11px;color:var(--accent2);letter-spacing:1px;}
.prog-bar{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-top:10px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:2px;transition:width 0.4s;}
.prog-label{font-size:10px;color:var(--muted);margin-top:6px;letter-spacing:0.5px;}

/* CAMPO CARD */
.campo-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:12px;transition:border-color 0.2s;}
.campo-card.completado{border-color:rgba(0,229,160,0.3);}
.campo-card.requerido-vacio{border-color:rgba(255,69,96,0.4);}
.campo-top{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.campo-num{width:26px;height:26px;background:rgba(0,119,255,0.1);border:1px solid rgba(0,119,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--accent2);flex-shrink:0;}
.campo-num.done{background:rgba(0,229,160,0.1);border-color:rgba(0,229,160,0.3);color:var(--success);}
.campo-label{font-size:14px;color:var(--text);font-weight:500;flex:1;}
.campo-tipo{font-size:9px;color:var(--muted);letter-spacing:1.5px;}
.req-badge{font-size:9px;color:var(--error);border:1px solid rgba(255,69,96,0.3);padding:2px 6px;border-radius:3px;letter-spacing:1px;flex-shrink:0;}

/* INPUTS POR TIPO */
.campo-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-family:"DM Mono",monospace;font-size:14px;color:var(--text);outline:none;transition:border-color 0.2s;}
.campo-input:focus{border-color:var(--accent2);}
.campo-input::placeholder{color:var(--muted);opacity:0.5;}
.campo-input.filled{border-color:rgba(0,229,160,0.4);}

/* SI/NO TOGGLE */
.sino-group{display:flex;gap:8px;}
.sino-btn{flex:1;padding:12px;background:var(--surface2);border:2px solid var(--border);border-radius:8px;font-family:"Syne",sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;color:var(--muted);text-align:center;}
.sino-btn:hover{border-color:var(--accent2);}
.sino-btn.sel-si{background:rgba(0,229,160,0.1);border-color:var(--success);color:var(--success);}
.sino-btn.sel-no{background:rgba(255,69,96,0.1);border-color:var(--error);color:var(--error);}

/* LISTA SELECT */
.campo-select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px 14px;font-family:"DM Mono",monospace;font-size:14px;color:var(--text);outline:none;appearance:none;cursor:pointer;}
.campo-select:focus{border-color:var(--accent2);}
.campo-select option{background:#131820;}
.campo-select.filled{border-color:rgba(0,229,160,0.4);}

/* RANGO SLIDER */
.rango-wrap{display:flex;flex-direction:column;gap:10px;}
.rango-val{font-family:"Syne",sans-serif;font-size:28px;font-weight:800;color:var(--accent);text-align:center;}
.rango-unit{font-size:13px;color:var(--muted);font-family:"DM Mono",monospace;}
.rango-slider{width:100%;appearance:none;height:6px;border-radius:3px;background:var(--surface2);outline:none;cursor:pointer;}
.rango-slider::-webkit-slider-thumb{appearance:none;width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));cursor:pointer;box-shadow:0 0 8px rgba(0,119,255,0.4);}
.rango-minmax{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);}
.rango-indicator{height:6px;background:linear-gradient(90deg,var(--success),var(--warn),var(--error));border-radius:3px;margin-bottom:4px;position:relative;}

/* FECHA/HORA */
.fecha-auto{padding:12px 16px;background:rgba(0,212,255,0.05);border:1px solid rgba(0,212,255,0.2);border-radius:8px;font-family:"Syne",sans-serif;font-size:14px;color:var(--accent);letter-spacing:1px;}

/* FOTO UPLOAD */
.foto-wrap{display:flex;flex-direction:column;gap:10px;}
.foto-drop{border:2px dashed var(--border);border-radius:10px;padding:24px;text-align:center;cursor:pointer;transition:all 0.2s;}
.foto-drop:hover{border-color:var(--accent2);background:rgba(0,119,255,0.03);}
.foto-drop.has-foto{border-color:rgba(0,229,160,0.4);background:rgba(0,229,160,0.03);}
.foto-preview{max-width:100%;border-radius:8px;margin-top:8px;display:none;}
.foto-preview.visible{display:block;}
.foto-input{display:none;}
.foto-label{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;}
.foto-icon{font-size:32px;opacity:0.4;}
.foto-text{font-size:12px;color:var(--muted);letter-spacing:0.5px;}
.foto-change{font-size:11px;color:var(--accent2);cursor:pointer;text-decoration:underline;}

/* FIRMA CANVAS */
.firma-wrap{position:relative;}
.firma-canvas{display:block;width:100%;height:120px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);cursor:crosshair;touch-action:none;}
.firma-canvas.has-sig{border-color:rgba(0,229,160,0.4);}
.firma-placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);pointer-events:none;letter-spacing:1px;opacity:0.5;}
.btn-clear{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-family:"DM Mono",monospace;font-size:10px;color:var(--muted);cursor:pointer;margin-top:6px;transition:all 0.2s;}
.btn-clear:hover{border-color:var(--error);color:var(--error);}

/* FIRMA TECNICO */
.firma-tec-section{background:var(--surface);border:1px solid rgba(0,229,160,0.2);border-radius:12px;padding:20px;margin-bottom:12px;}
.firma-tec-title{font-family:"Syne",sans-serif;font-size:13px;font-weight:700;color:var(--success);margin-bottom:4px;}
.firma-tec-sub{font-size:11px;color:var(--muted);margin-bottom:14px;}

/* BTN */
.btn{padding:12px 20px;border-radius:8px;font-family:"Syne",sans-serif;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:0.5px;transition:all 0.2s;border:none;display:inline-flex;align-items:center;gap:6px;}
.btn-p{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#080b10;}
.btn-p:hover:not(:disabled){opacity:0.9;}
.btn-p:disabled{opacity:0.4;cursor:not-allowed;}
.btn-o{background:none;border:1px solid var(--border);color:var(--muted);}
.btn-o:hover{border-color:var(--accent2);color:var(--accent);}
.btn-sm{padding:7px 12px;font-size:11px;}
.btn .spin{display:none;width:14px;height:14px;border:2px solid rgba(0,0,0,0.3);border-top-color:#080b10;border-radius:50%;animation:spin 0.6s linear infinite;}
.btn.loading .btn-text{display:none;}
.btn.loading .spin{display:block;}
@keyframes spin{to{transform:rotate(360deg)}}

/* STICKY BAR */
.sticky-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(8,11,16,0.97);border-top:1px solid var(--border);padding:14px 20px;display:flex;gap:10px;justify-content:space-between;align-items:center;z-index:40;backdrop-filter:blur(10px);}
.prog-mini{font-size:11px;color:var(--muted);}

/* TEMA CLARO — FORMULARIOS LEGIBLES */
[data-theme="light"] input,
[data-theme="light"] select,
[data-theme="light"] textarea { color: #111827 !important; background: #ffffff; border-color: #d1d5db; }
[data-theme="light"] input:disabled,
[data-theme="light"] select:disabled { background: #f9fafb !important; color: #374151 !important; }
[data-theme="light"] label { color: #374151; }
[data-theme="light"] .muted,
[data-theme="light"] [style*="color:var(--muted)"] { color: #6b7280; }
[data-theme="light"] tbody td { color: #111827; }
[data-theme="light"] .modal,
[data-theme="light"] .modal-overlay > div { background: #ffffff !important; }
[data-theme="light"] .msec-t { color: #111827; }
[data-theme="light"] .item-row input { background: #ffffff; color: #111827; border-color: #d1d5db; }
[data-theme="light"] .items-wrap { background: #f9fafb; border-color: #d1d5db; }
[data-theme="light"] .items-head { color: #6b7280; background: #f3f4f6; }
[data-theme="light"] .item-total { color: #059669; }
[data-theme="light"] .tot-label { color: #6b7280; }
[data-theme="light"] .tot-val { color: #111827; }
[data-theme="light"] .sec-head .sec-title { color: #111827; }
[data-theme="light"] .field label { color: #374151; }

/* ══════════════════════════════════════════
   RESPONSIVE MOVIL
   ══════════════════════════════════════════ */
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:8px;flex-direction:column;gap:5px;}
.hamburger span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px;transition:all 0.3s;}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:19;backdrop-filter:blur(2px);}

@media(max-width:768px){
  body{grid-template-columns:1fr !important;}
  .hamburger{display:flex;}
  .sidebar{position:fixed !important;top:0;left:-280px;width:280px;height:100vh !important;z-index:20;transition:left 0.3s ease;box-shadow:4px 0 24px rgba(0,0,0,0.4);}
  .sidebar.open{left:0;}
  .sidebar-overlay.open{display:block;}
  .main{padding:14px !important;}
  .stats-row,.stats-grid{grid-template-columns:1fr 1fr !important;gap:10px !important;}
  .row2,.row3,.row4{grid-template-columns:1fr !important;}
  .filters{flex-direction:column !important;}
  .modal{margin:10px auto !important;}
  .modal-overlay{padding:8px !important;}
  .dgrid{grid-template-columns:1fr !important;}
  .df.full{grid-column:1 !important;}
  .sbtns{flex-wrap:wrap !important;}
  .sbtn{font-size:9px !important;padding:6px 8px !important;}
  .items-head,.item-row{grid-template-columns:28px 1fr 60px 90px 36px !important;}
  .items-head div:nth-child(2),.item-row .i-ref,
  .items-head div:nth-child(6),.item-row .i-dpct,
  .items-head div:nth-child(7),.item-row .i-iva{display:none !important;}
}
@media(max-width:480px){
  .topbar{padding:0 12px !important;gap:8px !important;}
  .logo-name{display:none;}
  .stats-row,.stats-grid{grid-template-columns:1fr 1fr !important;}
  .tab{font-size:10px !important;padding:8px 6px !important;}
  .tab span:last-child{display:none;}
}

</style>
<script src="../assets/theme.js"></script>
</head>

        <div class="ph-name" id="phName">Cargando protocolo...</div>
        <div class="ph-equipo" id="phEquipo"></div>
      </div>
      <div id="phOrdenId" style="font-family:Syne,sans-serif;font-size:12px;color:var(--muted);"></div>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="prog-label" id="progLabel">0 de 0 campos completados</div>
  </div>

  <!-- CAMPOS DINAMICOS -->
  <div id="camposContainer"></div>

  <!-- FIRMA DEL TECNICO -->
  <div class="firma-tec-section" id="firmaTecSection" style="display:none;">
    <div class="firma-tec-title">&#10003; Firma del Tecnico</div>
    <div class="firma-tec-sub">Al firmar confirmas que ejecutaste el protocolo correctamente.</div>
    <div class="firma-wrap">
      <canvas id="firmaTecCanvas" class="firma-canvas" width="600" height="120"></canvas>
      <div class="firma-placeholder" id="firmaTecPlaceholder">FIRMA AQUI CON EL DEDO O MOUSE</div>
    </div>
    <button class="btn-clear" id="btnClearFirmaTec">x Limpiar firma</button>
  </div>
</div>

<!-- STICKY BAR -->
<div class="sticky-bar">
  <div class="prog-mini" id="progMini">Completando protocolo...</div>
  <div style="display:flex;gap:8px;">
    <button class="btn btn-o btn-sm" id="btnGuardarBorrador">Guardar borrador</button>
    <button class="btn btn-p" id="btnCompletarProtocolo" disabled>
      <span class="btn-text">&#10003; COMPLETAR PROTOCOLO</span>
      <div class="spin"></div>
    </button>
  </div>
</div>

<script src="../assets/supabase.js"></script>
<script src="../assets/auth.js"></script>
<script>
const params     = new URLSearchParams(window.location.search);
const ordenId    = params.get('orden');
const ejecucionId= params.get('ejecucion');

let _user = null, _tecnico = null;
let _ejecucion = null, _protocolo = null, _campos = [];
let _respuestas = {};   // campoId -> valor
let _firmaTec = '';
let _drawingTec = false;

(async () => {
  _user = await initAuth('tecnico');
  if (!_user) return;
  const { data: tec } = await db.from('tecnicos').select('id').eq('usuario_id', _user.id).single();
  _tecnico = tec;

  document.getElementById('btnVolver').href = 'orden.html?id=' + ordenId;

  if (!ejecucionId) { window.location.href = 'orden.html?id=' + ordenId; return; }
  await loadEjecucion();
  setupFirmaTecnico();
})();

async function loadEjecucion() {
  const { data: ejec } = await db.from('protocolo_ejecucion')
    .select('*, protocolos(*, protocolo_campos(*))')
    .eq('id', ejecucionId).single();

  if (!ejec) { window.location.href = 'orden.html?id=' + ordenId; return; }
  _ejecucion = ejec;
  _protocolo = ejec.protocolos;
  _campos    = (ejec.protocolos?.protocolo_campos || []).sort((a,b) => a.orden - b.orden);

  document.getElementById('phName').textContent   = _protocolo?.nombre || '—';
  document.getElementById('phEquipo').textContent = _protocolo?.equipo_tipo || '';
  document.getElementById('phOrdenId').textContent = 'Orden: ' + (params.get('orden') || '');

  // Cargar respuestas existentes
  const { data: resp } = await db.from('protocolo_respuestas')
    .select('*').eq('ejecucion_id', ejecucionId);
  (resp || []).forEach(r => { _respuestas[r.campo_id] = r; });

  renderCampos();
  document.getElementById('firmaTecSection').style.display = 'block';
}

function renderCampos() {
  const container = document.getElementById('camposContainer');
  container.innerHTML = '';
  _campos.forEach((campo, i) => renderCampo(campo, i + 1, container));
  updateProgress();
}

function renderCampo(campo, n, container) {
  const card = document.createElement('div');
  card.className = 'campo-card';
  card.dataset.id = campo.id;

  const respActual = _respuestas[campo.id];
  const tipoLabel  = {texto:'TEXTO',numero:'NUMERO',si_no:'SI / NO',lista:'LISTA',rango:'RANGO',fecha_hora:'FECHA/HORA',foto:'FOTO',firma:'FIRMA'}[campo.tipo] || campo.tipo;

  let inputHtml = '';

  if (campo.tipo === 'texto') {
    const val = respActual?.valor_texto || '';
    inputHtml = '<input type="text" class="campo-input' + (val ? ' filled' : '') + '" placeholder="Escribe aqui..." data-campo="' + campo.id + '" data-tipo="texto" value="' + val + '">';

  } else if (campo.tipo === 'numero') {
    const val = respActual?.valor_numero ?? '';
    inputHtml = '<div style="display:flex;gap:8px;align-items:center;">' +
      '<input type="number" class="campo-input' + (val!=='' ? ' filled' : '') + '" style="flex:1;" placeholder="0" data-campo="' + campo.id + '" data-tipo="numero" value="' + val + '">' +
      (campo.unidad ? '<span style="font-size:13px;color:var(--muted);padding:0 8px;">' + campo.unidad + '</span>' : '') +
      '</div>';

  } else if (campo.tipo === 'si_no') {
    const val = respActual?.valor_boolean;
    inputHtml = '<div class="sino-group">' +
      '<button class="sino-btn' + (val===true ? ' sel-si' : '') + '" data-campo="' + campo.id + '" data-v="true">&#10003; SI</button>' +
      '<button class="sino-btn' + (val===false ? ' sel-no' : '') + '" data-campo="' + campo.id + '" data-v="false">&#10007; NO</button>' +
      '</div>';

  } else if (campo.tipo === 'lista') {
    const val = respActual?.valor_opcion || '';
    const opts = (campo.opciones || []).map(o => '<option value="' + o + '"' + (val===o?' selected':'') + '>' + o + '</option>').join('');
    inputHtml = '<select class="campo-select' + (val ? ' filled' : '') + '" data-campo="' + campo.id + '" data-tipo="lista">' +
      '<option value="">-- Selecciona una opcion --</option>' + opts + '</select>';

  } else if (campo.tipo === 'rango') {
    const min = campo.rango_min ?? 0;
    const max = campo.rango_max ?? 100;
    const val = respActual?.valor_numero ?? min;
    inputHtml = '<div class="rango-wrap">' +
      '<div class="rango-val"><span id="rval_' + campo.id + '">' + val + '</span> <span class="rango-unit">' + (campo.unidad||'') + '</span></div>' +
      '<div class="rango-indicator"></div>' +
      '<input type="range" class="rango-slider" min="' + min + '" max="' + max + '" value="' + val + '" step="' + (max-min>100?1:0.1) + '" data-campo="' + campo.id + '" data-tipo="rango">' +
      '<div class="rango-minmax"><span>' + min + (campo.unidad?' '+campo.unidad:'') + '</span><span>' + max + (campo.unidad?' '+campo.unidad:'') + '</span></div>' +
      '</div>';

  } else if (campo.tipo === 'fecha_hora') {
    const now = new Date().toLocaleString('es-CO');
    if (!respActual) _respuestas[campo.id] = { valor_fecha: new Date().toISOString() };
    inputHtml = '<div class="fecha-auto">&#128336; ' + now + ' (automatico)</div>';

  } else if (campo.tipo === 'foto') {
    const fotoId = 'foto_' + campo.id;
    inputHtml = '<div class="foto-wrap">' +
      '<div class="foto-drop' + (respActual?.archivo_url ? ' has-foto' : '') + '" id="drop_' + campo.id + '">' +
        '<label class="foto-label" for="' + fotoId + '">' +
          '<div class="foto-icon">&#128247;</div>' +
          '<div class="foto-text">' + (respActual?.archivo_url ? 'Foto cargada &#10003;' : 'Toca para tomar o subir foto') + '</div>' +
          '<input type="file" accept="image/*" capture="environment" class="foto-input" id="' + fotoId + '" data-campo="' + campo.id + '">' +
        '</label>' +
      '</div>' +
      '<img class="foto-preview' + (respActual?.archivo_url ? ' visible' : '') + '" id="prev_' + campo.id + '" src="' + (respActual?.archivo_url||'') + '" alt="Foto">' +
      '</div>';

  } else if (campo.tipo === 'firma') {
    inputHtml = '<div class="firma-wrap">' +
      '<canvas id="firma_' + campo.id + '" class="firma-canvas' + (respActual?.archivo_url ? ' has-sig' : '') + '" data-campo="' + campo.id + '"></canvas>' +
      '<div class="firma-placeholder" id="fph_' + campo.id + '"' + (respActual?.archivo_url ? ' style="display:none"' : '') + '>FIRMA AQUI</div>' +
      '</div>' +
      '<button class="btn-clear" data-clear="' + campo.id + '">x Limpiar</button>';
  }

  card.innerHTML =
    '<div class="campo-top">' +
      '<div class="campo-num' + (isCampoCompleto(campo) ? ' done' : '') + '" id="cnum_' + campo.id + '">' + (isCampoCompleto(campo) ? '&#10003;' : n) + '</div>' +
      '<div style="flex:1;">' +
        '<div class="campo-label">' + campo.etiqueta + '</div>' +
        '<div class="campo-tipo">' + tipoLabel + (campo.unidad ? ' · ' + campo.unidad : '') + '</div>' +
      '</div>' +
      (campo.requerido ? '<div class="req-badge">REQUERIDO</div>' : '') +
    '</div>' +
    inputHtml;

  container.appendChild(card);

  // Eventos por tipo
  setTimeout(() => {
    if (campo.tipo === 'texto' || campo.tipo === 'numero') {
      const inp = card.querySelector('.campo-input');
      if (inp) inp.addEventListener('input', () => {
        const v = inp.value.trim();
        _respuestas[campo.id] = campo.tipo === 'numero' ? { valor_numero: parseFloat(v) } : { valor_texto: v };
        inp.className = 'campo-input' + (v ? ' filled' : '');
        marcarCompleto(campo);
        updateProgress();
      });
    }
    if (campo.tipo === 'lista') {
      const sel = card.querySelector('.campo-select');
      if (sel) sel.addEventListener('change', () => {
        _respuestas[campo.id] = { valor_opcion: sel.value };
        sel.className = 'campo-select' + (sel.value ? ' filled' : '');
        marcarCompleto(campo);
        updateProgress();
      });
    }
    if (campo.tipo === 'si_no') {
      card.querySelectorAll('.sino-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          card.querySelectorAll('.sino-btn').forEach(b => b.className = 'sino-btn');
          const isTrue = btn.dataset.v === 'true';
          btn.className = 'sino-btn ' + (isTrue ? 'sel-si' : 'sel-no');
          _respuestas[campo.id] = { valor_boolean: isTrue };
          marcarCompleto(campo);
          updateProgress();
        });
      });
    }
    if (campo.tipo === 'rango') {
      const slider = card.querySelector('.rango-slider');
      if (slider) slider.addEventListener('input', () => {
        document.getElementById('rval_' + campo.id).textContent = slider.value;
        _respuestas[campo.id] = { valor_numero: parseFloat(slider.value) };
        if (!_respuestas[campo.id].set) { _respuestas[campo.id].set = true; marcarCompleto(campo); updateProgress(); }
      });
      // El rango ya tiene valor por defecto
      if (!_respuestas[campo.id]) {
        _respuestas[campo.id] = { valor_numero: parseFloat(campo.rango_min ?? 0) };
        marcarCompleto(campo); updateProgress();
      }
    }
    if (campo.tipo === 'foto') {
      const inp = document.getElementById('foto_' + campo.id);
      if (inp) inp.addEventListener('change', async () => {
        const file = inp.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
          const prev = document.getElementById('prev_' + campo.id);
          const drop = document.getElementById('drop_' + campo.id);
          prev.src = e.target.result;
          prev.classList.add('visible');
          drop.classList.add('has-foto');
          drop.querySelector('.foto-text').textContent = 'Foto cargada ✓';
        };
        reader.readAsDataURL(file);
        try {
          const ruta = 'protocolos/' + ejecucionId + '/' + campo.id + '-' + Date.now() + '.' + file.name.split('.').pop();
          await db.storage.from('iit-archivos').upload(ruta, file, { upsert: true });
          _respuestas[campo.id] = { archivo_url: ruta };
          marcarCompleto(campo);
          updateProgress();
        } catch(e) {
          // Guardar como base64 si falla storage
          _respuestas[campo.id] = { archivo_url: 'local' };
          marcarCompleto(campo);
          updateProgress();
        }
      });
    }
    if (campo.tipo === 'firma') {
      setupFirmaCanvas('firma_' + campo.id, 'fph_' + campo.id, (dataUrl) => {
        _respuestas[campo.id] = { archivo_url: dataUrl };
        marcarCompleto(campo);
        updateProgress();
      });
      const clearBtn = card.querySelector('.btn-clear');
      if (clearBtn) clearBtn.addEventListener('click', () => {
        const cv = document.getElementById('firma_' + campo.id);
        cv.getContext('2d').clearRect(0, 0, cv.width, cv.height);
        document.getElementById('fph_' + campo.id).style.display = '';
        cv.classList.remove('has-sig');
        delete _respuestas[campo.id];
        marcarCompleto(campo);
        updateProgress();
      });
    }
  }, 0);
}

function isCampoCompleto(campo) {
  const r = _respuestas[campo.id];
  if (!r) return false;
  if (campo.tipo === 'texto')     return !!(r.valor_texto);
  if (campo.tipo === 'numero')    return r.valor_numero !== undefined && r.valor_numero !== null && r.valor_numero !== '';
  if (campo.tipo === 'si_no')     return r.valor_boolean !== undefined && r.valor_boolean !== null;
  if (campo.tipo === 'lista')     return !!(r.valor_opcion);
  if (campo.tipo === 'rango')     return r.valor_numero !== undefined;
  if (campo.tipo === 'fecha_hora')return !!(r.valor_fecha);
  if (campo.tipo === 'foto')      return !!(r.archivo_url);
  if (campo.tipo === 'firma')     return !!(r.archivo_url);
  return false;
}

function marcarCompleto(campo) {
  const numEl = document.getElementById('cnum_' + campo.id);
  const card  = document.querySelector('.campo-card[data-id="' + campo.id + '"]');
  const ok = isCampoCompleto(campo);
  if (numEl) { numEl.className = 'campo-num' + (ok ? ' done' : ''); numEl.innerHTML = ok ? '&#10003;' : campo.orden; }
  if (card)  { card.classList.toggle('completado', ok); card.classList.remove('requerido-vacio'); }
}

function updateProgress() {
  const total     = _campos.length;
  const completados = _campos.filter(c => isCampoCompleto(c)).length;
  const pct = total ? Math.round((completados / total) * 100) : 0;
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progLabel').textContent = completados + ' de ' + total + ' campos completados (' + pct + '%)';
  document.getElementById('progMini').textContent = completados + '/' + total + ' campos';
  const requeridos = _campos.filter(c => c.requerido && !isCampoCompleto(c));
  document.getElementById('btnCompletarProtocolo').disabled = requeridos.length > 0 || !_firmaTec;
}

// ── FIRMA CANVAS HELPER ───────────────────────────────────────
function setupFirmaCanvas(canvasId, placeholderId, onSign) {
  const cv  = document.getElementById(canvasId);
  if (!cv) return;
  cv.width  = cv.offsetWidth * window.devicePixelRatio;
  cv.height = 120 * window.devicePixelRatio;
  const ctx = cv.getContext('2d');
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  ctx.strokeStyle = '#00d4ff';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  let drawing = false;

  const getPos = e => {
    const r = cv.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: (src.clientX - r.left), y: (src.clientY - r.top) };
  };

  cv.addEventListener('mousedown',  e => { drawing=true; ctx.beginPath(); const p=getPos(e); ctx.moveTo(p.x,p.y); });
  cv.addEventListener('mousemove',  e => { if(!drawing)return; const p=getPos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); cv.classList.add('has-sig'); document.getElementById(placeholderId).style.display='none'; onSign(cv.toDataURL()); });
  cv.addEventListener('mouseup',    () => drawing=false);
  cv.addEventListener('touchstart', e => { e.preventDefault(); drawing=true; ctx.beginPath(); const p=getPos(e); ctx.moveTo(p.x,p.y); },{passive:false});
  cv.addEventListener('touchmove',  e => { e.preventDefault(); if(!drawing)return; const p=getPos(e); ctx.lineTo(p.x,p.y); ctx.stroke(); cv.classList.add('has-sig'); document.getElementById(placeholderId).style.display='none'; onSign(cv.toDataURL()); },{passive:false});
  cv.addEventListener('touchend',   () => drawing=false);
}

// ── FIRMA TECNICO ─────────────────────────────────────────────
function setupFirmaTecnico() {
  const cv  = document.getElementById('firmaTecCanvas');
  const phId = 'firmaTecPlaceholder';
  setupFirmaCanvas('firmaTecCanvas', phId, dataUrl => {
    _firmaTec = dataUrl;
    updateProgress();
  });
  document.getElementById('btnClearFirmaTec').addEventListener('click', () => {
    const ctx = cv.getContext('2d');
    ctx.clearRect(0,0,cv.width,cv.height);
    document.getElementById(phId).style.display='';
    cv.classList.remove('has-sig');
    _firmaTec = '';
    updateProgress();
  });
}

// ── GUARDAR BORRADOR ──────────────────────────────────────────
document.getElementById('btnGuardarBorrador').addEventListener('click', async () => {
  await guardarRespuestas();
  toast('Borrador guardado', 'success');
});

// ── COMPLETAR PROTOCOLO ───────────────────────────────────────
document.getElementById('btnCompletarProtocolo').addEventListener('click', async () => {
  // Validar requeridos
  const faltantes = _campos.filter(c => c.requerido && !isCampoCompleto(c));
  if (faltantes.length) {
    faltantes.forEach(c => {
      const card = document.querySelector('.campo-card[data-id="' + c.id + '"]');
      if (card) card.classList.add('requerido-vacio');
    });
    toast('Completa los campos requeridos primero', 'error');
    return;
  }
  if (!_firmaTec) { toast('Agrega tu firma para completar', 'error'); return; }

  const btn = document.getElementById('btnCompletarProtocolo');
  btn.classList.add('loading'); btn.disabled = true;

  try {
    await guardarRespuestas();

    // Completar ejecucion
    await db.from('protocolo_ejecucion').update({
      status:        'completado',
      firma_tecnico: _firmaTec,
      fecha_fin:     new Date().toISOString()
    }).eq('id', ejecucionId);

    toast('Protocolo completado exitosamente', 'success');
    setTimeout(() => { window.location.href = 'orden.html?id=' + ordenId; }, 1500);
  } catch(e) {
    toast('Error al completar: ' + e.message, 'error');
    btn.classList.remove('loading'); btn.disabled = false;
  }
});

async function guardarRespuestas() {
  for (const campo of _campos) {
    const r = _respuestas[campo.id];
    if (!r) continue;
    const payload = {
      ejecucion_id: ejecucionId,
      campo_id:     campo.id,
      valor_texto:   r.valor_texto   || null,
      valor_numero:  r.valor_numero  ?? null,
      valor_boolean: r.valor_boolean ?? null,
      valor_opcion:  r.valor_opcion  || null,
      valor_fecha:   r.valor_fecha   || null,
      archivo_url:   r.archivo_url   || null
    };
    const { data: existing } = await db.from('protocolo_respuestas')
      .select('id').eq('ejecucion_id', ejecucionId).eq('campo_id', campo.id).single();
    if (existing) {
      await db.from('protocolo_respuestas').update(payload).eq('id', existing.id);
    } else {
      await db.from('protocolo_respuestas').insert(payload);
    }
  }
}

function toast(msg, tipo='success') {
  const c={success:'var(--success)',error:'var(--error)',info:'var(--accent2)'};
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9999;background:var(--surface);border:1px solid '+c[tipo]+';border-radius:10px;padding:12px 20px;box-shadow:0 8px 32px rgba(0,0,0,0.4);font-family:"DM Mono",monospace;font-size:12px;color:'+c[tipo]+';white-space:nowrap;letter-spacing:0.5px;';
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3500);
}

// ── MENU HAMBURGUESA ──────────────────────────────────────────
(function(){
  const btn=document.getElementById('btnHamburger');
  const sidebar=document.querySelector('.sidebar');
  const overlay=document.getElementById('sidebarOverlay');
  if(!btn||!sidebar) return;
  const open=()=>{sidebar.classList.add('open');if(overlay)overlay.classList.add('open');};
  const close=()=>{sidebar.classList.remove('open');if(overlay)overlay.classList.remove('open');};
  btn.addEventListener('click',()=>sidebar.classList.contains('open')?close():open());
  if(overlay) overlay.addEventListener('click',close);
  document.querySelectorAll('.nav-item').forEach(a=>a.addEventListener('click',close));
})();

</script>
